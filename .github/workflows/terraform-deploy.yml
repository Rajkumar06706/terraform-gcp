name: Terraform Deploy from Secrets

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: gar-deploy
    permissions:
      contents: read
      id-token: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ~> 1.0
      
      - name: Check Required Secrets
        run: |
          echo "🔍 Checking for required secrets and variables..."
          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "❌ ERROR: GCP_PROJECT_ID secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.TOKEN_PAT }}" ]; then
            echo "❌ ERROR: TOKEN_PAT secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.ORG }}" ]; then
            echo "❌ ERROR: ORG secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.REPO_NAME }}" ]; then
            echo "❌ ERROR: REPO_NAME secret is not set"
            exit 1
          fi
          echo "✅ All required secrets are present"
      
      - name: Terraform Init
        run: terraform init
        env:
          TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_gcp_region: ${{ secrets.GCP_REGION || 'us-central1' }}
          TF_VAR_gar_repository_name: ${{ secrets.GAR_REPOSITORY_NAME || 'github-docker' }}
          TF_VAR_github_token: ${{ secrets.TOKEN_PAT }}
          TF_VAR_github_org: ${{ secrets.ORG }}
          TF_VAR_github_repo_name: ${{ secrets.REPO_NAME }}
          TF_VAR_service_account_id: ${{ secrets.SERVICE_ACCOUNT_ID || 'github-gar-sa' }}
          TF_VAR_workload_identity_pool_id: ${{ secrets.WORKLOAD_IDENTITY_POOL_ID || 'github-pool' }}
          TF_VAR_workload_identity_provider_id: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_ID || 'github-provider' }}
      
      - name: Terraform Validate
        run: terraform validate
        env:
          TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_gcp_region: ${{ secrets.GCP_REGION || 'us-central1' }}
          TF_VAR_gar_repository_name: ${{ secrets.GAR_REPOSITORY_NAME || 'github-docker' }}
          TF_VAR_github_token: ${{ secrets.TOKEN_PAT }}
          TF_VAR_github_org: ${{ secrets.ORG }}
          TF_VAR_github_repo_name: ${{ secrets.REPO_NAME }}
          TF_VAR_service_account_id: ${{ secrets.SERVICE_ACCOUNT_ID || 'github-gar-sa' }}
          TF_VAR_workload_identity_pool_id: ${{ secrets.WORKLOAD_IDENTITY_POOL_ID || 'github-pool' }}
          TF_VAR_workload_identity_provider_id: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_ID || 'github-provider' }}
      
      - name: Terraform Plan
        if: github.event.inputs.terraform_action == 'plan' || github.event.inputs.terraform_action == 'apply'
        run: terraform plan -out=tfplan
        env:
          TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_gcp_region: ${{ secrets.GCP_REGION || 'us-central1' }}
          TF_VAR_gar_repository_name: ${{ secrets.GAR_REPOSITORY_NAME || 'github-docker' }}
          TF_VAR_github_token: ${{ secrets.TOKEN_PAT }}
          TF_VAR_github_org: ${{ secrets.ORG }}
          TF_VAR_github_repo_name: ${{ secrets.REPO_NAME }}
          TF_VAR_service_account_id: ${{ secrets.SERVICE_ACCOUNT_ID || 'github-gar-sa' }}
          TF_VAR_workload_identity_pool_id: ${{ secrets.WORKLOAD_IDENTITY_POOL_ID || 'github-pool' }}
          TF_VAR_workload_identity_provider_id: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_ID || 'github-provider' }}
      
      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: tfplan
          path: tfplan
          retention-days: 1
      
      - name: Terraform Apply
        if: github.event.inputs.terraform_action == 'apply'
        run: terraform apply tfplan
        env:
          TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_gcp_region: ${{ secrets.GCP_REGION || 'us-central1' }}
          TF_VAR_gar_repository_name: ${{ secrets.GAR_REPOSITORY_NAME || 'github-docker' }}
          TF_VAR_github_token: ${{ secrets.TOKEN_PAT }}
          TF_VAR_github_org: ${{ secrets.ORG }}
          TF_VAR_github_repo_name: ${{ secrets.REPO_NAME }}
          TF_VAR_service_account_id: ${{ secrets.SERVICE_ACCOUNT_ID || 'github-gar-sa' }}
          TF_VAR_workload_identity_pool_id: ${{ secrets.WORKLOAD_IDENTITY_POOL_ID || 'github-pool' }}
          TF_VAR_workload_identity_provider_id: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_ID || 'github-provider' }}
      
      - name: Display Terraform Outputs
        if: github.event.inputs.terraform_action == 'apply' && always()
        run: |
          echo "📋 Terraform Outputs:"
          terraform output || echo "No outputs available yet"